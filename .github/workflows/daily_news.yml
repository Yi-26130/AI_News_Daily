# 路径：.github/workflows/daily_news.yml
name: AI News Agency Daily Runner

on:
  schedule:
    # 设定每天北京时间早上 8:00 运行 (GitHub 使用 UTC 时间，对应 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: 
    # 允许你在网页上手动点击“运行”按钮测试

jobs:
  build_and_run:
    runs-on: ubuntu-latest # 分配一台最新的 Linux 虚拟主机

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 配置 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install langgraph langchain-openai chromadb pydantic requests dashscope

    - name: 4. 恢复/保存本地向量数据库缓存
      # 极客操作：每次跑完把 ChromaDB 存下来，第二天再加载，实现历史记忆！
      uses: actions/cache@v4
      with:
        path: ./agency_db_v4
        key: chromadb-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          chromadb-${{ runner.os }}-

    - name: 5. 启动 AI 通讯社！
      env:
        # 从你的云端保险柜中提取密钥
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
      run: |
        cd AI_News_Agency
        python main.py
